# Remap prefix to Ctrl-a
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# True color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Mouse support
set -g mouse on

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Increase scrollback
set -g history-limit 50000

# Faster escape time (important for neovim)
set -sg escape-time 10

# Focus events (needed for neovim autoread)
set -g focus-events on

# Vi mode for copy
setw -g mode-keys vi

# Split panes with | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Navigate panes with vim keys
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with vim keys
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# --- Tiling layout (master + stack) ---
# Main pane takes 60% of the width
set -g main-pane-width '60%'
set -g main-pane-height '60%'

# Apply main-vertical layout (master left, stack right)
bind Space select-layout main-vertical

# Apply main-horizontal layout (master top, stack bottom)
bind C-Space select-layout main-horizontal

# Swap current pane into master (pane index 1) position
bind Enter swap-pane -s '!' -t '{top-left}'

# New pane in stack: split the master and reapply layout
bind n split-window -h -c "#{pane_current_path}" \; select-layout main-vertical

# Rotate panes forward/backward
bind -r C-j swap-pane -D
bind -r C-k swap-pane -U

# New windows in current path
bind c new-window -c "#{pane_current_path}"

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# --- workmux bindings ---
# Jump to last agent that finished (cycles through done agents)
bind Tab run-shell "workmux last-done"
# Toggle between current and previous agent
bind BTab run-shell "workmux last-agent"

# --- Status bar ---
set -g status-position bottom
set -g status-style "bg=default,fg=#586e75"
set -g status-left "#[fg=#268bd2,bold] #S #[fg=default]"
set -g status-left-length 30
set -g status-right "#(~/.tmux-git-status.sh '#{pane_current_path}') #[fg=#586e75]#{pane_current_path} #[fg=#2aa198]%b %d #[fg=#b58900,bold]%H:%M "
set -g status-right-length 80
set -g status-interval 5

# Window status
set -g window-status-format "#[fg=#586e75] #I:#W "
set -g window-status-current-format "#[fg=#93a1a1,bg=#073642,bold] #I:#W "
set -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=#073642"
set -g pane-active-border-style "fg=#268bd2"

# Message style
set -g message-style "bg=#073642,fg=#93a1a1"
