# Remap prefix to Ctrl-a
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# True color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Mouse support
set -g mouse on

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Increase scrollback
set -g history-limit 50000

# Faster escape time (important for neovim)
set -sg escape-time 10

# Focus events (needed for neovim autoread)
set -g focus-events on

# Vi mode for copy
setw -g mode-keys vi

# Split panes with | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Navigate panes with vim keys
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with vim keys
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# New windows in current path
bind c new-window -c "#{pane_current_path}"

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# --- workmux bindings ---
# Jump to last agent that finished (cycles through done agents)
bind Tab run-shell "workmux last-done"
# Toggle between current and previous agent
bind BTab run-shell "workmux last-agent"

# --- Status bar ---
set -g status-position bottom
set -g status-style "bg=default,fg=white"
set -g status-left "#[fg=blue,bold]#S #[fg=default]"
set -g status-left-length 30
set -g status-right "%H:%M"
